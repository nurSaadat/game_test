<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CryoDestroy: Refrigerant Rescue</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      background: #0d1117; color: #e6edf3; font-family: monospace;
      margin: 0; padding: 0; overflow: hidden;
    }
    #gameCanvas { border: 2px solid #30363d; display: block; margin: 0 auto; }
    #hud {
      text-align: center; padding: 8px 10px; font-size: 13px; color: #79c0ff;
      background: #0d1117; border-bottom: 1px solid #21262d;
    }
    /* Overlay sits above the canvas and handles modals/toasts */
    #overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 150;
    }
    #overlay:not(:empty) { pointer-events: auto; }
    /* Make sure inputs inside the overlay are styled */
    #overlay input, #overlay button { outline: none; }
    #overlay input:focus { border-color: #79c0ff !important; }
  </style>
</head>
<body>
  <div id="hud">
    🧊 CryoDestroy | Stage: <span id="stageName">Collection</span> |
    Net CO₂e Avoided: <span id="co2score">0</span> t
  </div>
  <canvas id="gameCanvas" width="900" height="600"></canvas>
  <div id="overlay"></div>
  <script type="module" src="main.js"></script>
</body>
</html>
